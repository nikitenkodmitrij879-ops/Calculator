name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build with Swift Package Manager
        run: |
          swift build -c release --triple arm64-apple-ios
      
      - name: Create app bundle
        run: |
          mkdir -p Payload/CalculatorApp.app
          cp .build/arm64-apple-ios/release/CalculatorApp Payload/CalculatorApp.app/
          
          cat > Payload/CalculatorApp.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>CalculatorApp</string>
              <key>CFBundleIdentifier</key>
              <string>4PRJCD67F5.app.panda639.papaya6365</string>
              <key>CFBundleName</key>
              <string>Calculator</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF
      
      - name: Create IPA (unsigned)
        run: |
          zip -r CalculatorApp-unsigned.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CalculatorApp-Unsigned
          path: CalculatorApp-unsigned.ipa
