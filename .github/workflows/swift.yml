name: Build IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp provision.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Profile installed"
      
      - name: Install certificate
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import Certificate.p12 -k build.keychain -P ${{ secrets.P12_PASSWORD }} -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          echo "Certificate installed"
          security find-identity -v
      
      - name: Build with Swift Package Manager
        run: |
          swift build -c release --triple arm64-apple-ios
      
      - name: Create app bundle
        run: |
          mkdir -p Payload/CalculatorApp.app
          cp .build/arm64-apple-ios/release/CalculatorApp Payload/CalculatorApp.app/
          
          cat > Payload/CalculatorApp.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>CalculatorApp</string>
              <key>CFBundleIdentifier</key>
              <string>4PRJCD67F5.app.panda639.papaya6365</string>
              <key>CFBundleName</key>
              <string>Calculator</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "App bundle created"
      
      - name: Sign app
        run: |
          CERT_ID=$(security find-identity -v -p codesigning | grep "iPhone" | head -1 | awk -F '"' '{print $2}')
          echo "Using certificate: $CERT_ID"
          codesign -f -s "$CERT_ID" Payload/CalculatorApp.app
          echo "App signed"
      
      - name: Create IPA
        run: |
          zip -r CalculatorApp.ipa Payload
          echo "IPA created"
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CalculatorApp
          path: CalculatorApp.ipa
