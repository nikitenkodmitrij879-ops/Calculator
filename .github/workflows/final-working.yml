name: Final Working Calculator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Simple UI Calculator
        run: |
          cat > main.swift << 'EOF'
          import UIKit
          
          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = CalculatorVC()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          
          class CalculatorVC: UIViewController {
              var displayLabel: UILabel!
              var historyLabel: UILabel!
              var currentNumber = "0"
              var previousNumber: Double = 0
              var operation: String?
              var newNumber = true
              var isScientific = false
              var mainButtons: [UIButton] = []
              var sciButtons: [UIButton] = []
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  setupDisplay()
                  createButtons()
                  layoutButtons()
                  
                  NotificationCenter.default.addObserver(self, selector: #selector(rotated), name: UIDevice.orientationDidChangeNotification, object: nil)
              }
              
              func setupDisplay() {
                  displayLabel = UILabel(frame: CGRect(x: 20, y: 100, width: UIScreen.main.bounds.width - 40, height: 80))
                  displayLabel.text = "0"
                  displayLabel.textColor = .white
                  displayLabel.font = .monospacedDigitSystemFont(ofSize: 64, weight: .light)
                  displayLabel.textAlignment = .right
                  view.addSubview(displayLabel)
                  
                  historyLabel = UILabel(frame: CGRect(x: 20, y: 60, width: UIScreen.main.bounds.width - 40, height: 30))
                  historyLabel.textColor = .gray
                  historyLabel.font = .systemFont(ofSize: 14)
                  historyLabel.textAlignment = .right
                  view.addSubview(historyLabel)
              }
              
              func createButtons() {
                  let mainTitles = [
                      ["AC", "+/-", "%", "÷"],
                      ["7", "8", "9", "×"],
                      ["4", "5", "6", "-"],
                      ["1", "2", "3", "+"],
                      ["0", ".", "=", "Sci"]
                  ]
                  
                  for row in mainTitles {
                      for title in row {
                          let btn = makeButton(title)
                          btn.addTarget(self, action: #selector(tap(_:)), for: .touchUpInside)
                          mainButtons.append(btn)
                          view.addSubview(btn)
                      }
                  }
                  
                  let sciTitles = [
                      ["sin", "cos", "tan", "√", "π"],
                      ["log", "ln", "x²", "1/x", "!"],
                      ["e", "^", "(", ")", "←"],
                      ["7", "8", "9", "÷", "AC"],
                      ["4", "5", "6", "×", "%"],
                      ["1", "2", "3", "-", "+/-"],
                      ["0", ".", "=", "+", "Main"]
                  ]
                  
                  for row in sciTitles {
                      for title in row {
                          let btn = makeButton(title)
                          btn.addTarget(self, action: #selector(sciTap(_:)), for: .touchUpInside)
                          sciButtons.append(btn)
                          view.addSubview(btn)
                          btn.isHidden = true
                      }
                  }
              }
              
              func makeButton(_ title: String) -> UIButton {
                  let btn = UIButton(type: .system)
                  btn.setTitle(title, for: .normal)
                  btn.setTitleColor(.white, for: .normal)
                  btn.titleLabel?.font = .systemFont(ofSize: title.count > 2 ? 18 : 28, weight: .medium)
                  btn.backgroundColor = colorFor(title)
                  btn.layer.cornerRadius = 35
                  return btn
              }
              
              func colorFor(_ title: String) -> UIColor {
                  if title == "÷" || title == "×" || title == "-" || title == "+" || title == "=" { return .orange }
                  if title == "AC" || title == "+/-" || title == "%" || title == "←" { return UIColor(white: 0.3, alpha: 1) }
                  if title == "Sci" || title == "Main" { return UIColor(white: 0.2, alpha: 1) }
                  if title.count > 2 { return UIColor(white: 0.25, alpha: 1) }
                  return UIColor(white: 0.2, alpha: 1)
              }
              
              @objc func rotated() {
                  layoutButtons()
              }
              
              func layoutButtons() {
                  let isLandscape = UIScreen.main.bounds.width > UIScreen.main.bounds.height
                  
                  if isScientific {
                      for b in mainButtons { b.isHidden = true }
                      for b in sciButtons { b.isHidden = false }
                      layoutGrid(sciButtons, cols: 5, isLandscape: isLandscape)
                  } else {
                      for b in sciButtons { b.isHidden = true }
                      for b in mainButtons { b.isHidden = false }
                      layoutGrid(mainButtons, cols: 4, isLandscape: isLandscape)
                  }
              }
              
              func layoutGrid(_ buttons: [UIButton], cols: Int, isLandscape: Bool) {
                  let w = view.bounds.width
                  let spacing: CGFloat = 10
                  let btnH: CGFloat = isLandscape ? 55 : 70
                  let btnW = (w - CGFloat(cols + 1) * spacing) / CGFloat(cols)
                  let startY = view.bounds.height - CGFloat(buttons.count / cols) * (btnH + spacing) - 100
                  
                  for (i, btn) in buttons.enumerated() {
                      let row = i / cols
                      let col = i % cols
                      let x = spacing + CGFloat(col) * (btnW + spacing)
                      let y = startY + CGFloat(row) * (btnH + spacing)
                      var ww = btnW
                      if btn.title(for: .normal) == "0" { ww = btnW * 2 + spacing }
                      btn.frame = CGRect(x: x, y: y, width: ww, height: btnH)
                      btn.layer.cornerRadius = btnH / 2
                  }
              }
              
              func format(_ v: Double) -> String {
                  let s = String(format: "%.6f", v)
                  return s.replacingOccurrences(of: "\\.?0+$", with: "", options: .regularExpression)
              }
              
              @objc func tap(_ sender: UIButton) {
                  let label = sender.title(for: .normal) ?? ""
                  if label == "Sci" { isScientific = true; layoutButtons(); return }
                  handle(label)
              }
              
              @objc func sciTap(_ sender: UIButton) {
                  let label = sender.title(for: .normal) ?? ""
                  if label == "Main" { isScientific = false; layoutButtons(); return }
                  handleScientific(label)
              }
              
              func handle(_ label: String) {
                  UIImpactFeedbackGenerator(style: .light).impactOccurred()
                  
                  switch label {
                  case "0"..."9":
                      if newNumber { currentNumber = label; newNumber = false }
                      else { currentNumber = currentNumber == "0" ? label : currentNumber + label }
                      displayLabel.text = currentNumber
                  case ".":
                      if newNumber { currentNumber = "0."; newNumber = false }
                      else if !currentNumber.contains(".") { currentNumber += "." }
                      displayLabel.text = currentNumber
                  case "÷","×","-","+":
                      if let v = Double(currentNumber) { previousNumber = v; operation = label; newNumber = true }
                  case "=":
                      if let v = Double(currentNumber), let op = operation {
                          var r: Double = 0
                          switch op {
                          case "+": r = previousNumber + v
                          case "-": r = previousNumber - v
                          case "×": r = previousNumber * v
                          case "÷": r = v != 0 ? previousNumber / v : 0
                          default: break
                          }
                          historyLabel.text = "\(format(previousNumber)) \(op) \(format(v)) = \(format(r))"
                          currentNumber = format(r)
                          displayLabel.text = currentNumber
                          newNumber = true
                          operation = nil
                      }
                  case "AC": currentNumber = "0"; previousNumber = 0; operation = nil; newNumber = true; displayLabel.text = "0"; historyLabel.text = ""
                  case "+/-": if let v = Double(currentNumber) { currentNumber = String(v * -1); displayLabel.text = currentNumber }
                  case "%": if let v = Double(currentNumber) { currentNumber = String(v / 100); displayLabel.text = currentNumber }
                  default: break
                  }
              }
              
              func handleScientific(_ label: String) {
                  UIImpactFeedbackGenerator(style: .light).impactOccurred()
                  guard let v = Double(currentNumber) else { return }
                  var r: Double = 0
                  
                  switch label {
                  case "sin": r = sin(v * .pi / 180)
                  case "cos": r = cos(v * .pi / 180)
                  case "tan": r = tan(v * .pi / 180)
                  case "√": r = v >= 0 ? sqrt(v) : 0
                  case "π": r = Double.pi
                  case "log": r = v > 0 ? log10(v) : 0
                  case "ln": r = v > 0 ? log(v) : 0
                  case "x²": r = v * v
                  case "1/x": r = v != 0 ? 1 / v : 0
                  case "!":
                      var f: Double = 1
                      for i in 1...Int(v) { f *= Double(i) }
                      r = f
                  case "e": r = M_E
                  case "^":
                      if operation == "^" { r = pow(previousNumber, v); operation = nil }
                      else { previousNumber = v; operation = "^"; newNumber = true; return }
                  case "←":
                      if currentNumber.count > 1 { currentNumber = String(currentNumber.dropLast()) }
                      else { currentNumber = "0" }
                      displayLabel.text = currentNumber
                      return
                  default: handle(label); return
                  }
                  
                  historyLabel.text = "\(label)(\(currentNumber)) = \(format(r))"
                  currentNumber = format(r)
                  displayLabel.text = currentNumber
                  newNumber = true
              }
          }
          EOF
      
      - name: Compile
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build
          swiftc main.swift -sdk "$SDK" -target arm64-apple-ios15.0 -o build/Calculator -emit-executable -framework UIKit -framework Foundation
          chmod +x build/Calculator
      
      - name: Create IPA
        run: |
          mkdir -p Payload/Calculator.app
          cp build/Calculator Payload/Calculator.app/Calculator
          
          cat > Payload/Calculator.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Calculator</string>
              <key>CFBundleIdentifier</key>
              <string>4PRJCD67F5.app.panda639.papaya6365</string>
              <key>CFBundleName</key>
              <string>Calc</string>
              <key>CFBundleDisplayName</key>
              <string>Калькулятор</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          echo "APPL????" > Payload/Calculator.app/PkgInfo
          cd Payload && zip -r ../Calculator.ipa . && cd ..
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Calculator
          path: Calculator.ipa
