name: Build Liquid Glass Calculator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build iOS App
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build
          
          swiftc Sources/main.swift \
            -sdk "$SDK_PATH" \
            -target arm64-apple-ios15.0 \
            -o build/CalculatorApp \
            -emit-executable \
            -framework UIKit \
            -framework SwiftUI \
            -framework CoreHaptics \
            -framework AVFoundation \
            -parse-as-library
          
          if [ -f "build/CalculatorApp" ]; then
            echo "✅ Компиляция успешна!"
          else
            echo "❌ Ошибка компиляции"
            exit 1
          fi
      
      - name: Create app bundle
        run: |
          mkdir -p Payload/CalculatorApp.app
          cp build/CalculatorApp Payload/CalculatorApp.app/
          cp Info.plist Payload/CalculatorApp.app/
          echo "APPL????" > Payload/CalculatorApp.app/PkgInfo
      
      - name: Create IPA
        run: |
          cd Payload
          zip -r ../CalculatorApp.ipa .
          cd ..
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiquidGlassCalculator
          path: CalculatorApp.ipa
